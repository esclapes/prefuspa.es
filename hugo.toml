baseURL = 'https://prefuspa.com/'
title = 'PREFUSPA — Prefabricats de fusta i palla'
defaultContentLanguage = 'es'
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.es]
    languageName = 'Español'
    languageCode = 'es'
    weight = 1
    title = 'PREFUSPA — Casas sostenibles y ecológicas'
    [languages.es.params]
      description = 'Casas prefabricadas sostenibles y ecológicas en Alicante. Bioconstrucción con madera y paja.'

  [languages.en]
    languageName = 'English'
    languageCode = 'en'
    weight = 2
    contentDir = 'content/en'
    title = 'PREFUSPA — Sustainable & Ecological Houses'
    [languages.en.params]
      description = 'Sustainable prefabricated ecological houses in Alicante, Spain. Bioconstruction with wood and straw.'

  [languages.ca]
    languageName = 'Valencià'
    languageCode = 'ca'
    weight = 3
    contentDir = 'content/ca'
    title = 'PREFUSPA — Cases sostenibles i ecològiques'
    [languages.ca.params]
      description = 'Cases prefabricades sostenibles i ecològiques a Alacant. Bioconstrucció amb fusta i palla.'

[params]
  phone = '653 772 074'
  whatsapp = '34653772074'
  email = 'prefuspa@gmail.com'
  company_name = 'PREFUSPA VIVA S.L.'
  cif = 'B10843001'
  [params.address]
    street = 'Príncipe, 25'
    city = 'Vall de Laguar'
    region = 'Alicante'
    postalCode = '03791'
    country = 'ES'
  [params.social]
    facebook = 'https://web.facebook.com/pages/Prefuspa%20Viva%20SL/105223182396093/'
    instagram = 'https://www.instagram.com/prefuspa/'

[menus]
  [[menus.es]]
    name = 'Inicio'
