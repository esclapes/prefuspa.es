    weight = 1
  [[menus.es]]
    name = 'Servicios'
    pageRef = '/servicios'
    weight = 2
  [[menus.es]]
    name = 'Galería'
    pageRef = '/galeria'
    weight = 3
  [[menus.es]]
    name = 'Contacto'
    pageRef = '/contacto'
    weight = 4

  [[menus.en]]
