{{ define "main" }}

<section class="page gallery-page">
  <div class="container">
    <header class="page__header">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page__subtitle">{{ . }}</p>{{ end }}
    </header>

    {{/* Project filters */}}
    {{ with .Params.projects }}
    <div class="gallery-filters">
      <button class="gallery-filter is-active" data-filter="all" aria-pressed="true">{{ i18n "all" }}</button>
      {{ range . }}
      <button class="gallery-filter" data-filter="{{ .slug }}" aria-pressed="false">{{ .name }}</button>
      {{ end }}
    </div>
    {{ end }}

    <div class="gallery-grid">
      {{ range .Params.projects }}
        {{ $project := . }}
        {{ range .images }}
        <figure class="gallery-item" data-project="{{ $project.slug }}">
          <a href="/images/gallery/{{ $project.slug }}/{{ . }}" class="gallery-item__link">
            <img src="/images/gallery/{{ $project.slug }}/{{ . }}"
                 alt="{{ $project.name }}"
                 loading="lazy">
          </a>
        </figure>
        {{ end }}
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
