<header class="site-header">
  <div class="container header-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="logo" aria-label="{{ .Site.Title }} — {{ i18n "nav_home" }}">
      <img src="/img/logo.png" alt="{{ .Site.Title }}" width="180" height="50">
    </a>

    <button class="menu-toggle" aria-label="Menu" aria-expanded="false" aria-controls="main-nav">
      <span class="hamburger"></span>
    </button>

    <nav id="main-nav" class="main-nav" aria-label="{{ i18n "menu" }}">
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
        {{ if ne .Name (i18n "nav_contact") }}
        <li>
          <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
        {{ end }}
      </ul>

      {{ partial "language-switcher.html" . }}
    </nav>

    <div class="header-actions">
      <a href="tel:{{ .Site.Params.phone | replaceRE `\s` `` }}" class="header-phone" aria-label="{{ i18n "phone" }}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        <span class="header-phone__number">{{ .Site.Params.phone }}</span>
      </a>

      {{ range .Site.Menus.main }}
      {{ if eq .Name (i18n "nav_contact") }}
      <a href="{{ .URL }}" class="btn btn--primary header-cta">
        {{ .Name }}
      </a>
      {{ end }}
      {{ end }}
    </div>
  </div>
</header>
