{{ if .IsTranslated }}
<div class="language-switcher" role="navigation" aria-label="{{ i18n "language" }}">
  <button class="lang-current" aria-expanded="false" aria-haspopup="true">
    {{ if eq .Site.Language.Lang "ca" }}VA{{ else }}{{ upper .Site.Language.Lang }}{{ end }}
    <svg class="icon-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <ul class="lang-dropdown">
    {{ range .AllTranslations }}
    <li>
      <a href="{{ .RelPermalink }}" lang="{{ .Language.Lang }}" hreflang="{{ .Language.Lang }}">
        {{ if eq .Language.Lang "ca" }}VA{{ else }}{{ upper .Language.Lang }}{{ end }}
      </a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
