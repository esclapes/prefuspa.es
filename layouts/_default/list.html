{{ define "main" }}
<section class="page">
  <div class="container">
    <header class="page__header">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page__subtitle">{{ . }}</p>{{ end }}
    </header>
    <div class="page__content prose">
      {{ .Content }}
    </div>
    {{ if .Pages }}
    <ul class="page-list">
      {{ range .Pages }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
    {{ end }}
  </div>
</section>
{{ end }}
