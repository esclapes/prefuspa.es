{{ define "main" }}
<article class="page">
  <div class="container">
    <header class="page__header">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page__subtitle">{{ . }}</p>{{ end }}
    </header>
    <div class="page__content prose">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
